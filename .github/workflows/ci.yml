name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit
      - run: npm run validate:pack
      - run: npm run test:run
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run e2e
      - run: npm run build
